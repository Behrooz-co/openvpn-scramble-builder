name: Build OpenWRT IPK for J1900 (x86_64)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest # استفاده از آخرین نسخه برای اتصال آنی به سرورهای گیت‌هاب

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          # نصب ابزارهای اصلی بدون نیاز به پکیج‌های حذف شده اوبونتو جدید
          sudo apt-get install -y build-essential gawk gettext libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget time

      - name: Download & Extract OpenWRT 24.10.5 SDK
        run: |
          wget https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-14.2.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-*-x86-64_* sdk

      - name: Inject openvpn-scramble Package
        run: |
          mkdir -p sdk/package/openvpn-scramble
          if [ -d "openvpn-scramble" ]; then
            cp -r openvpn-scramble/* sdk/package/openvpn-scramble/
          else
            cp -r * sdk/package/openvpn-scramble/ 2>/dev/null || true
          fi
          rm -rf sdk/package/openvpn-scramble/sdk

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          # کامپایل مستقیم پکیج
          make package/openvpn-scramble/compile V=s

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-scramble-OpenWrt-24.10.5-x86_64
          path: sdk/bin/packages/x86_64/**/openvpn-scramble*.ipk
