name: Build OpenWRT IPK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup SDK & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget curl zstd git
          
          BASE_URL="https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/"
          SDK_FILE=$(curl -s "${BASE_URL}sha256sums" | grep "openwrt-sdk" | awk '{print $2}' | sed 's/^\*//' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "Error: Could not locate SDK file."
            exit 1
          fi
          
          echo "Downloading SDK: ${SDK_FILE}"
          wget -q --show-progress "${BASE_URL}${SDK_FILE}" -O sdk-archive.tar.zst
          
          tar -xf sdk-archive.tar.zst
          mv openwrt-sdk-* sdk

      - name: 3. Download Package Source
        run: |
          echo "=== Cloning openvpn-scramble source ==="
          
          # ساخت مسیر پکیج
          mkdir -p sdk/package/openvpn-scramble
          
          # لطفا لینک ریپازیتوری سورس کد را به جای YOUR_SOURCE_URL_HERE قرار دهید
          # مثال: git clone https://github.com/someone/openvpn-scramble.git sdk/package/openvpn-scramble/
          git clone YOUR_SOURCE_URL_HERE sdk/package/openvpn-scramble/
          
          echo "=== Verifying Downloaded Files ==="
          ls -la sdk/package/openvpn-scramble/
          
          echo "=== Updating Feeds ==="
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 4. Compile Package
        run: |
          cd sdk
          make defconfig
          make package/openvpn-scramble/prepare V=s
          make package/openvpn-scramble/compile V=s

      - name: 5. Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-scramble-ipk
          path: sdk/bin/packages/x86_64/**/openvpn-scramble*.ipk
