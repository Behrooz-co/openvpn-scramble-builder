name: Build OpenWRT IPK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SDK
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget curl zstd
          
          # دانلود SDK رسمی
          wget -q https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-14.2.0_musl.Linux-x86_64.tar.zst
          tar -xf openwrt-sdk-24.10.5-x86-64_gcc-14.2.0_musl.Linux-x86_64.tar.zst
          mv openwrt-sdk-* sdk

      - name: Prepare Package
        run: |
          # کپی به جایگاه درست
          mkdir -p sdk/package/openvpn-scramble
          # اطمینان از اینکه فایل Makefile در ریشه پوشه openvpn-scramble قرار دارد
          cp -r openvpn-scramble/* sdk/package/openvpn-scramble/
          
          # رفرش کردن لیست پکیج‌ها برای شناسایی پکیج جدید
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compile
        run: |
          cd sdk
          make defconfig
          # کامپایل به روش عمومی (این روش حتی اگر پکیج در لیست نباشد، با فایل‌های محلی کار می‌کند)
          make package/openvpn-scramble/prepare V=s
          make package/openvpn-scramble/compile V=s

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-scramble-ipk
          path: sdk/bin/packages/x86_64/base/openvpn-scramble*.ipk
