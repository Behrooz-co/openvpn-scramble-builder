name: Build OpenVPN with XOR

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare System
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget curl zstd
          
      - name: Find and Download SDK
        run: |
          # آدرس نسخه 24.10
          BASE="https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/"
          
          # استخراج نام فایل واقعی موجود در سرور
          FILENAME=$(curl -s "$BASE" | grep -o 'openwrt-sdk-.*-x86-64_.*.tar.xz' | head -n 1)
          
          if [ -z "$FILENAME" ]; then
            echo "Error: SDK file not found. Check URL manually."
            exit 1
          fi
          
          echo "Found SDK: $FILENAME"
          wget -q --show-progress "${BASE}${FILENAME}"
          tar -xf "$FILENAME"
          mv openwrt-sdk-* sdk
          
      - name: Prepare Package and Patch
        run: |
          wget -q https://raw.githubusercontent.com/egc112/OpenWRT-egc-add-on/main/openvpn-scramble/feeds/618/996-tunnelblick-openvpn_xorpatch-e.patch -O xor_patch.patch
          mkdir -p sdk/package/feeds/packages/openvpn-openssl/patches/
          cp xor_patch.patch sdk/package/feeds/packages/openvpn-openssl/patches/
          
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install openvpn-openssl

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          make package/feeds/packages/openvpn-openssl/compile V=s

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-xor-ipk
          path: sdk/bin/packages/x86_64/**/openvpn-openssl*.ipk
