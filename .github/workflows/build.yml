name: Build OpenWRT IPK for J1900 (x86_64)

on:
  workflow_dispatch:
  push:
    branches:
      - main

# رفع هشدار گیت‌هاب با فورس کردن محیط به نود ۲۴
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget
          # رفع خطای احتمالی لایه پکیج ابونتو
          sudo rm -rf /var/lib/apt/lists/*

      - name: Download OpenWRT 24.10.5 SDK (x86_64)
        run: |
          wget https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-14.2.0_musl.Linux-x86_64.tar.xz
          tar -xJf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-*-x86-64_* sdk

      - name: Update and Install Official Feeds
        run: |
          cd sdk
          # تنظیم آدرس فیدها و آپدیت کردن گام‌به‌گام برای جلوگیری از Exit code 100
          sed -i 's/src-git base.*/src-git base https:\/\/github.com\/openwrt\/openwrt.git;openwrt-24.10/' feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          # نصب وابستگی‌های اجباری برای لایبرری‌های شبکه و ابزارهای رمزنگاری
          ./scripts/feeds install openvpn

      - name: Add openvpn-scramble Package
        run: |
          # ایجاد دایرکتوری در بخش کستوم پکیج‌ها
          mkdir -p sdk/package/openvpn-scramble
          if [ -d "openvpn-scramble" ]; then
            cp -r openvpn-scramble/* sdk/package/openvpn-scramble/
          else
            # اگر فایل‌ها مستقیماً در ریشه ریپازیتوری شما ریخته شده‌اند
            cp -r * sdk/package/openvpn-scramble/ 2>/dev/null || true
          fi

      - name: Configure and Compile Package
        run: |
          cd sdk
          # ایجاد خودکار فایل .config بر اساس سیستم هدف J1900
          make defconfig
          # انتخاب و کامپایل ابزار به همراه جزییات کامل لاگ
          make package/openvpn-scramble/compile V=s -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-scramble-OpenWrt-24.10.5-x86_64
          path: |
            sdk/bin/packages/x86_64/base/openvpn-scramble*.ipk
            sdk/bin/packages/x86_64/custom/openvpn-scramble*.ipk
            sdk/bin/packages/x86_64/packages/openvpn-scramble*.ipk
