name: Build OpenVPN Scramble

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

```
steps:

- name: Install dependencies
  run: |
    sudo apt update

    sudo apt install -y \
      build-essential clang flex bison g++ gawk \
      gcc-multilib g++-multilib gettext git \
      libncurses5-dev libssl-dev python3-setuptools \
      rsync swig unzip zlib1g-dev file wget curl

- name: Clone OpenWrt
  run: |
    git clone https://github.com/openwrt/openwrt.git
    cd openwrt
    git checkout openwrt-24.10

- name: Update feeds
  run: |
    cd openwrt
    ./scripts/feeds update -a
    ./scripts/feeds install -a

- name: Add Scramble patches
  run: |
    mkdir -p openwrt/feeds/packages/net/openvpn/patches

    cd openwrt/feeds/packages/net/openvpn/patches

    wget https://raw.githubusercontent.com/egc112/OpenWRT-egc-add-on/main/openvpn-scramble/feeds/66/992-tunnelblick-openvpn_xorpatch-a.diff

    wget https://raw.githubusercontent.com/egc112/OpenWRT-egc-add-on/main/openvpn-scramble/feeds/66/993-tunnelblick-openvpn_xorpatch-b.diff

    wget https://raw.githubusercontent.com/egc112/OpenWRT-egc-add-on/main/openvpn-scramble/feeds/66/994-tunnelblick-openvpn_xorpatch-c.diff

    wget https://raw.githubusercontent.com/egc112/OpenWRT-egc-add-on/main/openvpn-scramble/feeds/66/995-tunnelblick-openvpn_xorpatch-d.diff

    wget https://raw.githubusercontent.com/egc112/OpenWRT-egc-add-on/main/openvpn-scramble/feeds/66/996-tunnelblick-openvpn_xorpatch-e.diff

- name: Configure OpenWrt
  run: |
    cd openwrt

    echo 'CONFIG_TARGET_x86=y' >> .config
    echo 'CONFIG_TARGET_x86_64=y' >> .config
    echo 'CONFIG_PACKAGE_openvpn-openssl=y' >> .config

    make defconfig

- name: Build OpenVPN
  run: |
    cd openwrt
    make package/openvpn/compile -j$(nproc) V=s

- name: Upload IPK
  uses: actions/upload-artifact@v4
  with:
    name: openvpn-scramble-ipk
    path: openwrt/bin/packages/x86_64/packages/*.ipk
```
