name: Build OpenVPN with XOR

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare System (Disable Needrestart)
        run: |
          # غیرفعال کردن کاملِ needrestart برای جلوگیری از ارور 8
          echo '$nrconf{restart} = "a";' | sudo tee -a /etc/needrestart/conf.d/restart.conf
          echo '$nrconf{kernelhints} = -1;' | sudo tee -a /etc/needrestart/conf.d/kernel.conf
          
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget curl zstd

      - name: Setup OpenWrt SDK
        run: |
          wget -q https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-14.2.0_musl.Linux-x86_64.tar.xz
          tar -xf openwrt-sdk-*.tar.xz
          mv openwrt-sdk-* sdk

      - name: Prepare Package and Patch
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install openvpn-openssl
          
          # کپی پچ به مسیر درست
          mkdir -p package/feeds/packages/openvpn-openssl/patches/
          cp ../996-tunnelblick-openvpn_xorpatch-e.patch package/feeds/packages/openvpn-openssl/patches/

      - name: Compile Package
        run: |
          cd sdk
          # بیلد با استفاده از V=s برای لاگ‌گیری دقیق
          make package/feeds/packages/openvpn-openssl/compile V=s

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-xor-ipk
          path: sdk/bin/packages/x86_64/**/openvpn-openssl*.ipk
