name: Build OpenVPN with XOR

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare System
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget curl zstd
          
      - name: Download & Setup SDK
        run: |
          BASE_URL="https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/"
          # پیدا کردن فایل SDK
          SDK_FILENAME=$(curl -s "${BASE_URL}sha256sums" | grep "openwrt-sdk" | awk '{print $2}' | sed 's/^\*//' | head -n 1)
          
          echo "Downloading: ${SDK_FILENAME}"
          wget -q --show-progress "${BASE_URL}${SDK_FILENAME}"
          
          echo "Extracting SDK..."
          tar -xf "${SDK_FILENAME}"
          
          # پیدا کردن خودکار نام پوشه استخراج شده و تغییر نام آن به sdk
          EXTRACTED_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n 1)
          if [ -d "$EXTRACTED_DIR" ]; then
            mv "$EXTRACTED_DIR" sdk
          else
            echo "Error: SDK directory not found after extraction!"
            exit 1
          fi

      - name: Prepare Package and Patch
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install openvpn-openssl
          
          mkdir -p package/feeds/packages/openvpn-openssl/patches/
          cp ../996-tunnelblick-openvpn_xorpatch-e.patch package/feeds/packages/openvpn-openssl/patches/

      - name: Compile Package
        run: |
          cd sdk
          make package/feeds/packages/openvpn-openssl/compile V=s

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-xor-ipk
          path: sdk/bin/packages/x86_64/**/openvpn-openssl*.ipk
