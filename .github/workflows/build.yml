name: Build OpenWRT IPK for J1900 (x86_64)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget time

      - name: Auto-Detect & Download OpenWRT 24.10.5 SDK
        run: |
          BASE_URL="https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/"
          echo "Searching for exact SDK filename in $BASE_URL ..."
          
          # پیدا کردن نام دقیق فایل از لیست هش‌های سرور برای جلوگیری از ارور ۴۰۴
          SDK_FILE=$(wget -qO- "${BASE_URL}sha256sums" | grep -m 1 "openwrt-sdk" | awk '{print $2}' | sed 's/^\*//')
          
          # مسیر جایگزین در صورت پیدا نشدن فایل هش
          if [ -z "$SDK_FILE" ]; then
             echo "Fallback to HTML scraping..."
             SDK_FILE=$(wget -qO- "$BASE_URL" | grep -oE 'openwrt-sdk-[^"]+\.tar\.xz' | head -n 1)
          fi
          
          echo "Downloading: $SDK_FILE"
          wget "${BASE_URL}${SDK_FILE}" -O sdk.tar.xz
          
          # استخراج و تغییر نام پوشه
          tar -xJf sdk.tar.xz
          rm sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Inject openvpn-scramble Package
        run: |
          mkdir -p sdk/package/openvpn-scramble
          if [ -d "openvpn-scramble" ]; then
            cp -r openvpn-scramble/* sdk/package/openvpn-scramble/
          else
            cp -r * sdk/package/openvpn-scramble/ 2>/dev/null || true
          fi
          # پاک کردن پوشه‌های اضافی که باعث لوپ می‌شوند
          rm -rf sdk/package/openvpn-scramble/sdk

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          make package/openvpn-scramble/compile V=s

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-scramble-OpenWrt-24.10.5-x86_64
          path: sdk/bin/packages/x86_64/**/openvpn-scramble*.ipk
