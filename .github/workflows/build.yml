name: Build OpenWRT IPK for J1900 (x86_64)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          # اضافه شدن zstd برای استخراج فایل‌های جدید OpenWrt
          sudo apt-get install -y build-essential gawk gettext libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget curl zstd time

      - name: Download Official OpenWrt 24.10.5 SDK
        run: |
          BASE_URL="https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/"
          echo "Fetching SDK info from $BASE_URL"
          
          # خواندن دقیق نام فایل (با فرمت tar.zst) مستقیماً از فایل هش OpenWrt
          SDK_FILE=$(curl -s "${BASE_URL}sha256sums" | grep "openwrt-sdk" | awk '{print $2}' | sed 's/^\*//' | head -n 1)
          
          if [ -z "$SDK_FILE" ]; then
            echo "Error: Could not locate SDK file on OpenWrt server."
            exit 1
          fi
          
          echo "Exact SDK file found: $SDK_FILE"
          wget -q --show-progress "${BASE_URL}${SDK_FILE}" -O sdk-archive.tar.zst
          
          # استخراج صحیح آرشیو zst
          tar -xf sdk-archive.tar.zst
          rm sdk-archive.tar.zst
          mv openwrt-sdk-* sdk

      - name: Inject openvpn-scramble Package
        run: |
          mkdir -p sdk/package/openvpn-scramble
          if [ -d "openvpn-scramble" ]; then
            cp -r openvpn-scramble/* sdk/package/openvpn-scramble/
          else
            cp -r * sdk/package/openvpn-scramble/ 2>/dev/null || true
          fi
          rm -rf sdk/package/openvpn-scramble/sdk

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          make package/openvpn-scramble/compile V=s

      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-scramble-OpenWrt-24.10.5-r29087-x86_64
          path: sdk/bin/packages/x86_64/**/openvpn-scramble*.ipk
