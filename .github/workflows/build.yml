name: Build OpenVPN with XOR

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare System
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gawk gettext libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget curl zstd
          
      - name: Download & Setup SDK (Retry-Logic)
        run: |
          # آدرس جایگزین برای دانلود پایدارتر
          SDK_URL="https://downloads.openwrt.org/releases/24.10.5/targets/x86/64/openwrt-sdk-24.10.5-x86-64_gcc-14.2.0_musl.Linux-x86_64.tar.xz"
          
          # تلاش برای دانلود با قابلیت از سرگیری (Resume)
          wget -c --tries=5 --timeout=30 --show-progress "$SDK_URL" -O sdk.tar.xz
          
          tar -xf sdk.tar.xz
          # پیدا کردن خودکار نام پوشه استخراج شده و تغییر نام
          mv openwrt-sdk-* sdk
          
      - name: Download Patch and Prepare Package
        run: |
          wget -q https://raw.githubusercontent.com/egc112/OpenWRT-egc-add-on/main/openvpn-scramble/feeds/618/996-tunnelblick-openvpn_xorpatch-e.patch -O xor_patch.patch
          
          mkdir -p sdk/package/feeds/packages/openvpn-openssl/patches/
          cp xor_patch.patch sdk/package/feeds/packages/openvpn-openssl/patches/
          
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install openvpn-openssl

      - name: Compile Package
        run: |
          cd sdk
          make defconfig
          make package/feeds/packages/openvpn-openssl/compile V=s

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openvpn-xor-ipk
          path: sdk/bin/packages/x86_64/**/openvpn-openssl*.ipk
